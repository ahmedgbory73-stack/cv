name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Capacitor Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install project dependencies
      run: |
        npm install --legacy-peer-deps

    - name: Install Capacitor CLI & Platform Packages
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

    - name: Build Web Application Assets
      run: |
        npm run build

    - name: Initialize Capacitor Config & Add Android Folder
      run: |
        # Generate capacitor.config.json if not present
        if [ ! -f "capacitor.config.json" ]; then
          npx cap init "TelegStudio" "com.watan.telegstudio" --web-dir=dist
        fi
        # Add android platform directory
        npx cap add android

    - name: Sync Web Assets with Capacitor Android Bundle
      run: |
        npx cap sync android

    - name: Set up JDK 17 for Gradle compilation
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Change permissions for Gradle Wrapper to executable
      run: chmod +x android/gradlew

    - name: Compile and Build Android Debug APK with Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK to GitHub Actions Icons/Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TelegStudio-Android-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
